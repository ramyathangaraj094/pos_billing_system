            </div>
             <div class="max-w-7xl mx-auto bg-white p-8 rounded-2xl mt-20 shadow-xl">
                <!-- FORM -->
  <input id="unitCode" placeholder="Unit Name (kg, pcs, liter)" class="border p-2 w-full mb-2">
  <input id="unitName" placeholder="Description" class="border p-2 w-full mb-2">

  <button id="btn" onclick="addOrUpdate()" 
    class="bg-purple-600 text-white px-4 py-2 font-bold mt-5 rounded">
    Add Unit
  </button>

  <!-- TABLE -->
  <div class="mt-4 overflow-auto">
    <div id="unitList"></div>
  </div>

</div>

<script>
let units = JSON.parse(localStorage.getItem("units")) || [];
let editId = null;

/* ---------- ADD / UPDATE ---------- */
function addOrUpdate() {
  let code = unitCode.value.trim();
  let name = unitName.value.trim();

  if (!name) return alert("Enter unit name");

  // DUPLICATE CHECK
  let duplicate = units.find(u =>
    (u.code === code || u.name.toLowerCase() === name.toLowerCase()) &&
    u.id !== editId
  );

  if (duplicate) {
    return alert("❌ Unit Code or Name already exists!");
  }

  if (editId === null) {
    units.push({
      id: Date.now(),
      code,
      name,
      createdAt: new Date().toLocaleString()
    });
  } else {
    units = units.map(u =>
      u.id === editId ? { ...u, code, name } : u
    );
    editId = null;
    btn.innerText = "Add Unit";
  }

  saveAndRender();
  clearForm();
}

/* ---------- EDIT ---------- */
function editUnit(id) {
  let u = units.find(x => x.id === id);

  unitCode.value = u.code;
  unitName.value = u.name;

  editId = id;
  btn.innerText = "Update Unit";
}

/* ---------- DELETE ---------- */
function deleteUnit(id) {
  units = units.filter(u => u.id !== id);
  saveAndRender();
}

/* ---------- SAVE ---------- */
function saveAndRender() {
  localStorage.setItem("units", JSON.stringify(units));
  render();
}

/* ---------- CLEAR ---------- */
function clearForm() {
  unitCode.value = "";
  unitName.value = "";
}

/* ---------- RENDER TABLE ---------- */
function render() {
  unitList.innerHTML = `
    <table class="w-full border border-gray-300">
      <thead>
        <tr class="bg-gradient-to-r from-purple-600 to-orange-500 p-2 text-white font-bold mt-20 text-lg ">
          <th class="p-2 text-left">Unit Name</th>
          <th class="p-2 text-left">Description</th>
          <th class="p-2 text-left">Action</th>
        </tr>
      </thead>
      <tbody>
        ${units.map(u => `
          <tr class="border-b hover:bg-gray-100">
            <td class="p-2">${u.code}</td>
            <td class="p-2">${u.name}</td>
            <td class="p-2 flex gap-2">
              <button onclick="editUnit(${u.id})"
                class="bg-yellow-500 text-white px-2 py-1 text-sm rounded">
                Edit
              </button>

              <button onclick="deleteUnit(${u.id})"
                class="bg-red-500 text-white px-2 py-1 text-sm rounded">
                Delete
              </button>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

render();
</script>
