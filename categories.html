            </div>
             <div class="max-w-7xl mx-auto bg-white p-8 rounded-2xl mt-20 shadow-xl">
                <input id="catCode" placeholder="C001 or c001" class="border p-2 w-full mb-2">
  <input id="catName" placeholder="Category Name" class="border p-2 w-full mb-2">

  <button id="btn" onclick="addOrUpdate()" class="bg-purple-600 text-white px-4 py-2  rounded">
    Add Category
  </button>

  <!-- TABLE -->
  <div class="mt-4 overflow-auto">
    <div id="catList"></div>
  </div>
             </div>
        </div>
        <script>
let categories = JSON.parse(localStorage.getItem("categories")) || [];
let editId = null;

/* ---------- ADD / UPDATE ---------- */
function addOrUpdate() {
  let code = catCode.value.trim();
  let name = catName.value.trim();

  if (!name) return alert("Enter category name");

  // ❌ DUPLICATE CHECK
  let duplicate = categories.find(c =>
    (c.code === code || c.name.toLowerCase() === name.toLowerCase()) &&
    c.id !== editId
  );

  if (duplicate) {
    return alert("❌ Category Code or Name already exists!");
  }

  if (editId === null) {
    categories.push({
      id: Date.now(),
      code,
      name,
      createdAt: new Date().toLocaleString()
    });
  } else {
    categories = categories.map(c =>
      c.id === editId ? { ...c, code, name } : c
    );
    editId = null;
    btn.innerText = "Add Category";
  }

  saveAndRender();
  clearForm();
}

/* ---------- EDIT ---------- */
function editCategory(id) {
  let cat = categories.find(c => c.id === id);

  catCode.value = cat.code;
  catName.value = cat.name;

  editId = id;
  btn.innerText = "Update Category";
}

/* ---------- DELETE ---------- */
function deleteCategory(id) {
  categories = categories.filter(c => c.id !== id);
  saveAndRender();
}

/* ---------- SAVE ---------- */
function saveAndRender() {
  localStorage.setItem("categories", JSON.stringify(categories));
  render();
}

/* ---------- CLEAR ---------- */
function clearForm() {
  catCode.value = "";
  catName.value = "";
}

/* ---------- RENDER TABLE ---------- */
function render() {
  catList.innerHTML = `
    <table class="max-7xl mx-auto w-full border border-gray-300">
      <thead>
        <tr class="bg-gradient-to-r from-purple-600 to-orange-500 p-2 text-white font-bold text-lg ">
          <th class="p-2 text-left">Code</th>
          <th class="p-2 text-left">Name</th>
          <th class="p-2 text-left">Action</th>
        </tr>
      </thead>
      <tbody>
        ${categories.map(c => `
          <tr class="border-b hover:bg-gray-100">
            <td class="p-2">${c.code}</td>
            <td class="p-2">${c.name}</td>
            <td class="p-2 flex gap-2">
              <button onclick="editCategory(${c.id})"
                class="bg-yellow-500 text-white px-2 py-1 text-sm rounded">
                Edit
              </button>

              <button onclick="deleteCategory(${c.id})"
                class="bg-red-500 text-white px-2 py-1 text-sm rounded">
                Delete
              </button>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;

 
}

render();
</script>
