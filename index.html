<script>
  function loadLowStock() {

  let inventory =
    JSON.parse(localStorage.getItem("inventory")) || [];

  // filter stock < 5
  let lowStock = inventory.filter(item =>
    Number(item.stock) < 5
  );

  // count
  document.getElementById("lowStockCount")
    .innerText = lowStock.length;

  // names list
  let names = lowStock.map(item =>
    item.name + " (" + item.stock + ")"
  ).join(", ");

  document.getElementById("lowStockNames")
    .innerText = names || "No Low Stock";
}

loadLowStock();
</script>
        <!--Card 5-->
       <div class="bg-indigo-500 text-white p-6 rounded-xl shadow-lg">

  <script>

let chart;

function loadDashboard() {

  let sales = JSON.parse(localStorage.getItem("sales")) || [];
  let inventory = JSON.parse(localStorage.getItem("inventory")) || [];
  let customers = JSON.parse(localStorage.getItem("customers")) || [];

  let revenue = sales.reduce((s, i) =>
    s + Number(i.total || 0), 0);

  let lowStockItems = inventory.filter(p => Number(p.stock) < 5);

  let expiredItems = inventory.filter(p =>
    p.expiry &&
    new Date(p.expiry) <= new Date(Date.now() + 2 * 86400000)
  );

  // UI update
  document.getElementById("reportTotal").innerText = revenue.toFixed(2);
  document.getElementById("invoiceCount").innerText = sales.length;
  document.getElementById("customerCount").innerText = customers.length;
  document.getElementById("lowStockCount").innerText = lowStockItems.length;
  document.getElementById("expiredCount").innerText = expiredItems.length;

  // chart
  let grouped = {};

  sales.forEach(s => {
    let d = s.date || "Unknown";
    grouped[d] = (grouped[d] || 0) + Number(s.total || 0);
  });

  let labels = Object.keys(grouped);
  let data = Object.values(grouped);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("dashboardChart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Revenue",
        data,
        borderColor: "#3b82f6",
        backgroundColor: "rgba(59,130,246,0.2)",
        fill: true,
        tension: 0.4
      }]
    }
  });

  // return DATA for PDF
  return {
    revenue,
    customers: customers.length,
    lowStockItems,
    expiredItems
  };
}

function downloadPDF() {

  const data = loadDashboard(); // ✅ FIXED

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 20;

  doc.setFontSize(18);
  doc.text("SK DEPARTMENT STORE REPORT", 20, y);

  y += 15;

  doc.setFontSize(12);

  doc.text("Total Revenue: ₹" + data.revenue.toFixed(2), 20, y);
  y += 10;

  doc.text("Total Customers: " + data.customers, 20, y);
  y += 10;

  doc.text("Low Stock: " + data.lowStockItems.length, 20, y);
  y += 10;

  doc.text("Expired Products: " + data.expiredItems.length, 20, y);

  y += 15;

  doc.setFontSize(14);
  doc.text("Low Stock Items:", 20, y);
  y += 10;

  data.lowStockItems.forEach(i => {
    doc.setFontSize(10);
    doc.text(`${i.name} - ${i.stock}`, 20, y);
    y += 7;

    if (y > 270) {
      doc.addPage();
      y = 20;
    }
  });

  y += 10;

  doc.setFontSize(14);
  doc.text("Expired Items:", 20, y);
  y += 10;

  data.expiredItems.forEach(i => {
    doc.setFontSize(10);
    doc.text(`${i.name} - ${i.expiry}`, 20, y);
    y += 7;

    if (y > 270) {
      doc.addPage();
      y = 20;
    }
  });

  doc.save("dashboard_report.pdf");
}

loadDashboard();

</script>
